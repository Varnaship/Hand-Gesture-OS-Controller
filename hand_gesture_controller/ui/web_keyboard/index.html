<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Keyboard</title>
    <link rel="stylesheet" href="https://unpkg.com/simple-keyboard@latest/build/css/index.css">
    <style>
      body { background: #222; color:#fff; font-family: Arial, Helvetica, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
      .container { width: 900px; }
      #input { width:100%; height:40px; font-size:20px; padding:6px; margin-bottom:10px; }
      .simple-keyboard { margin: 0 auto; }
    </style>
  </head>
  <body>
    <div class="container">
      <input id="input" placeholder="Type here with your hand" />
      <div id="keyboard"></div>
    </div>

    <script src="https://unpkg.com/simple-keyboard@latest/build/index.js"></script>
    <script>
      const Keyboard = window.SimpleKeyboard.default;
      const keyboard = new Keyboard({
        onKeyPress: button => {},
        layout: {
          default: [
            "q w e r t y u i o p",
            "a s d f g h j k l",
            "z x c v b n m",
            "{space}"
          ]
        },
        display: {"{space}": "SPACE"},
        mergeDisplay: true,
      });

      const input = document.getElementById('input');
      function onVirtualKey(key) {
        if (key === "{space}") {
          input.value += ' ';
          return;
        }
        input.value += key;
      }

      // expose a simple API for clicks via DOM events
      window.virtualKeyboard = {
        clickKey: (k) => {
          // translate internal key names
          if (k === 'SPACE' || k === '{space}') { input.value += ' '; return; }
          input.value += k;
        }
      };
    </script>
  </body>
</html>
